<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Finalizar Compra</title>
  <link rel="stylesheet" href="../css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="../js/utils.js" defer></script>
  <script src="../js/checkout.js" defer></script>
</head>

<body>

  <header class="navbar">
    <a href="../index.html">NovaTech</a>

    <nav>
      <a href="../index.html">Inicio</a>
      <a href="../index.html#productos">Productos</a>
      <a href="carrito.html">🛒 <span id="contadorCarrito">0</span></a>
    </nav>
  </header>

  <h1>Finalizar Compra</h1>

  <div class="checkout-container">

    <form id="formCheckout" class="checkout-form">

      <h2>Datos del Cliente</h2>

      <div class="grid-2">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
      </div>

      <input type="email" id="correo" placeholder="Correo electrónico" required>
      <input type="text" id="direccion" placeholder="Dirección" required>

      <div class="grid-2">
        <input type="text" id="pais" placeholder="País" required>
        <input type="text" id="ciudad" placeholder="Ciudad" required>
      </div>

      <hr class="separador">

      <h2>Datos de Tarjeta</h2>

      <input type="text" id="tarjeta" placeholder="Número de tarjeta" required>

      <div class="grid-2">
        <input type="text" id="cvv" placeholder="CVV" required>
        <input type="month" id="fecha" required>
      </div>

      <button class="btn-pagar" type="submit">
        Confirmar Pago
      </button>

    </form>

    <div class="checkout-resumen">
      <h2>Resumen de Compra</h2>

      <div id="resumenCheckout"></div>

      <div class="checkout-total">
        <strong>Total: </strong>
        <span id="totalCheckout">S/ 0</span>
      </div>
    </div>

  </div>

  <div id="popupRecibo" class="popup">
    <div class="popup-content">

      <h2>Recibo de Compra</h2>

      <div id="datosCliente"></div>

      <hr>

      <div id="productosRecibo"></div>

      <h3 id="totalRecibo"></h3>

      <button onclick="cerrarRecibo()">Cerrar</button>

    </div>
  </div>

</body>

</html>
